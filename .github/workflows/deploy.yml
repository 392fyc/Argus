name: Deploy to NAS

on:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
      - '.research/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb \
            -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Setup SSH via Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NAS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Configure SSH to use cloudflared as proxy for ssh.fyc-space.uk
          cat >> ~/.ssh/config << 'EOF'
          Host nas
            HostName ssh.fyc-space.uk
            User 392fyc
            IdentityFile ~/.ssh/id_ed25519
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
          EOF

          # Test connection
          ssh nas "echo 'SSH via Cloudflare Tunnel OK'"

      - name: Transfer files to NAS
        run: |
          ARGUS_DIR="/share/homes/392fyc/argus"

          for f in Dockerfile entrypoint-guard.py patch_suggestion_format.py \
                   configuration.toml docker-compose.yml docker-compose.polling.yml; do
            if [ -f "$f" ]; then
              cat "$f" | ssh nas "cat > $ARGUS_DIR/$f"
              echo "✓ $f"
            fi
          done

      - name: Rebuild and restart on NAS
        run: |
          ARGUS_DIR="/share/homes/392fyc/argus"
          DOCKER="/share/CACHEDEV1_DATA/.qpkg/container-station/bin/docker"
          DHOST="DOCKER_HOST=unix:///var/run/system-docker.sock"

          ssh nas "
            echo '${{ secrets.NAS_SUDO_PASS }}' | sudo -S $DHOST $DOCKER compose \
              -f $ARGUS_DIR/docker-compose.yml build --no-cache pr-agent 2>&1 | tail -5
            echo '${{ secrets.NAS_SUDO_PASS }}' | sudo -S $DHOST $DOCKER compose \
              -f $ARGUS_DIR/docker-compose.yml up -d --force-recreate pr-agent 2>&1
          "

      - name: Verify deployment
        run: |
          sleep 15
          DOCKER="/share/CACHEDEV1_DATA/.qpkg/container-station/bin/docker"
          DHOST="DOCKER_HOST=unix:///var/run/system-docker.sock"

          STATUS=$(ssh nas \
            "echo '${{ secrets.NAS_SUDO_PASS }}' | sudo -S $DHOST $DOCKER ps --filter name=argus --format '{{.Status}}' 2>/dev/null | head -1")
          echo "Container status: $STATUS"
          if echo "$STATUS" | grep -q "Up"; then
            echo "✅ Argus deployed successfully"
          else
            echo "❌ Deployment failed"
            exit 1
          fi
