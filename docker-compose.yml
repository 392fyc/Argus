services:
  # ── Argus: PR-Agent + User Whitelist Guard ──────────────────────
  pr-agent:
    build: .
    container_name: argus
    restart: unless-stopped
    ports:
      - "${PR_AGENT_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      # Comma-separated list of GitHub usernames allowed to trigger reviews.
      # Leave empty to allow ALL users.
      - ARGUS_ALLOWED_USERS=${ARGUS_ALLOWED_USERS:-}
    volumes:
      - ./configuration.toml:/app/pr_agent/settings/configuration.toml:ro
      - ./.secrets.toml:/app/pr_agent/settings/.secrets.toml:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3000/')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Cloudflare Tunnel (exposes webhook to internet) ───────────
  # network_mode: host required on QNAP NAS for container-to-host routing.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: argus-tunnel
    restart: unless-stopped
    network_mode: host
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
